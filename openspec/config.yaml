schema: spec-driven

project: bettechexam

context: |
  Tech stack: .NET 10 (C#), new .slnx solution format.
  Architecture: Clean Architecture — Domain → Application → Infra + Presentation.
  Testing: xUnit + FluentAssertions + NSubstitute planned; test csproj currently has zero NuGet packages.
  Style: ImplicitUsings enabled, Nullable enabled, no .editorconfig, no Directory.Build.props.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "dotnet build BetBetBet\\BetBetBet.slnx"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

